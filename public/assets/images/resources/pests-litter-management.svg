<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Poultry Litter Management</title>
  <desc id="desc">Illustration of dry litter management for pest prevention.</desc>
