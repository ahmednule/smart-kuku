  </defs>
  <rect width="1200" height="800" fill="url(#bg)" />
  <rect x="120" y="160" width="960" height="500" rx="26" fill="#ffffff" stroke="#ca8a04" stroke-width="5" />
  <path d="M180 560 C280 510 420 510 520 560 C620 610 760 610 860 560 C920 530 980 530 1020 550" fill="none" stroke="#a16207" stroke-width="10" />
  <g fill="#eab308">
